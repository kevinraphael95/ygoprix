<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Price Duel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Nunito', sans-serif;
  background: #111;
  overflow: hidden;
  color: #fff;
  user-select: none;
}

/* ══════════════════════════════════════════════
   HEADER — logo + score
══════════════════════════════════════════════ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: transparent;
  pointer-events: none;
}

.logo {
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: -0.01em;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  pointer-events: all;
}
.logo span { color: #ffd166; }

.score-badge {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 999px;
  padding: 6px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  pointer-events: all;
}
.score-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1;
}
.score-item .val {
  font-size: 1.15rem;
  font-weight: 900;
  color: #ffd166;
}
.score-item .lbl {
  font-size: 0.5rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.45);
  margin-top: 1px;
}
.score-sep {
  width: 1px; height: 24px;
  background: rgba(255,255,255,0.15);
}

/* ══════════════════════════════════════════════
   LIVES
══════════════════════════════════════════════ */
#lives {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
  pointer-events: none;
}
.life {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  transition: all 0.3s;
}
.life.lost {
  background: rgba(255,255,255,0.18);
  box-shadow: none;
}

/* ══════════════════════════════════════════════
   GAME AREA — two full-screen halves
══════════════════════════════════════════════ */
#game {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* Each card panel = 50% of screen height */
.panel {
  position: relative;
  flex: 1;
  overflow: hidden;
  cursor: default;
}

/* Background image fills the panel */
.panel-bg {
  position: absolute;
  inset: -5%;  /* slight overscan for ken burns */
  background-size: cover;
  background-position: center;
  transition: transform 8s ease;
  transform: scale(1.06);
}
.panel:hover .panel-bg {
  transform: scale(1.0);
}

/* Gradient so text is readable */
.panel-top .panel-bg-grad {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.08) 0%,
    rgba(0,0,0,0.18) 40%,
    rgba(0,0,0,0.72) 100%
  );
}
.panel-bot .panel-bg-grad {
  position: absolute; inset: 0;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.08) 0%,
    rgba(0,0,0,0.18) 40%,
    rgba(0,0,0,0.72) 100%
  );
}

/* Card text info */
.panel-content {
  position: absolute;
  left: 0; right: 0;
  z-index: 5;
  padding: 0 clamp(20px, 5vw, 60px);
}
.panel-top .panel-content { bottom: 24px; }
.panel-bot .panel-content { top: 24px; }

.panel-eyebrow {
  font-size: clamp(0.55rem, 1.4vw, 0.7rem);
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 4px;
}
.panel-name {
  font-size: clamp(1.2rem, 3.5vw, 2rem);
  font-weight: 900;
  line-height: 1.1;
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.7);
  max-width: 600px;
}
.panel-type {
  font-size: clamp(0.65rem, 1.5vw, 0.8rem);
  font-weight: 600;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
  letter-spacing: 0.04em;
}

/* Price tag — big and bold like moreorless */
.price-tag {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 10px 20px;
  margin-top: 10px;
  min-width: 120px;
}
.price-tag .pt-lbl {
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.price-tag .pt-val {
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  font-weight: 900;
  color: #ffd166;
  line-height: 1;
  margin-top: 2px;
}
.price-tag .pt-val.hidden {
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.3em;
  font-size: clamp(1rem, 2.5vw, 1.5rem);
}

/* Shimmer overlay for loading */
.shimmer {
  position: absolute;
  inset: 0;
  z-index: 20;
  background: linear-gradient(90deg, #1a1a1a 0%, #272727 50%, #1a1a1a 100%);
  background-size: 200% 100%;
  animation: shim 1.3s ease infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  opacity: 0.5;
}
.shimmer.off { display: none; }
@keyframes shim {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

/* ══════════════════════════════════════════════
   DIVIDER — center strip with buttons
══════════════════════════════════════════════ */
#divider {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  left: 0; right: 0;
  z-index: 60;
  height: 72px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.div-question {
  font-size: clamp(0.65rem, 1.8vw, 0.85rem);
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  white-space: nowrap;
}

.btn-guess {
  padding: 10px 22px;
  border-radius: 999px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.07);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.72rem, 1.8vw, 0.85rem);
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-guess:hover:not(:disabled) {
  background: rgba(255,209,102,0.18);
  border-color: #ffd166;
  color: #ffd166;
  transform: scale(1.04);
}
.btn-guess:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }
.btn-guess.correct {
  background: rgba(6,214,160,0.22);
  border-color: #06d6a0;
  color: #06d6a0;
}
.btn-guess.wrong {
  background: rgba(239,35,60,0.18);
  border-color: #ef233c;
  color: #ef233c;
}

/* ══════════════════════════════════════════════
   SLIDE-UP animation for bottom panel
══════════════════════════════════════════════ */
.panel-bot {
  transform: translateY(100%);
  transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
}
.panel-bot.slide-in {
  transform: translateY(0);
}

/* ══════════════════════════════════════════════
   RESULT TOAST
══════════════════════════════════════════════ */
#toast {
  position: fixed;
  top: 68px; left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px 22px;
  font-size: clamp(0.8rem, 2vw, 0.95rem);
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok { color: #06d6a0; border-color: rgba(6,214,160,0.35); }
#toast.ko { color: #ef233c; border-color: rgba(239,35,60,0.3); }

/* ══════════════════════════════════════════════
   NEXT BUTTON
══════════════════════════════════════════════ */
#next-btn {
  position: fixed;
  bottom: 50px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
}
#next-btn.show {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
#next-btn button {
  padding: 14px 36px;
  background: linear-gradient(135deg, #e8b84b, #ffd166);
  color: #111;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(255,209,102,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
#next-btn button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 32px rgba(255,209,102,0.65);
}

/* ══════════════════════════════════════════════
   GAME OVER OVERLAY
══════════════════════════════════════════════ */
#gameover {
  position: fixed; inset: 0;
  z-index: 500;
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(20px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  text-align: center;
  padding: 32px;
}
#gameover.show { display: flex; animation: goIn 0.4s ease; }
@keyframes goIn {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}
.go-emoji { font-size: 4rem; }
.go-title {
  font-size: clamp(2.5rem, 8vw, 5rem);
  font-weight: 900;
  color: #ef233c;
  letter-spacing: -0.02em;
  filter: drop-shadow(0 0 30px rgba(239,35,60,0.5));
  line-height: 1;
}
.go-sub {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.go-cards {
  display: flex;
  gap: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px 32px;
}
.go-card { text-align: center; }
.go-card-v {
  font-size: 2.5rem;
  font-weight: 900;
  color: #ffd166;
  line-height: 1;
}
.go-card-l {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}
.go-sep { width: 1px; background: rgba(255,255,255,0.1); }
.go-replay {
  padding: 14px 40px;
  background: linear-gradient(135deg, #e8b84b, #ffd166);
  color: #111;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(255,209,102,0.4);
  transition: transform 0.15s;
}
.go-replay:hover { transform: scale(1.05); }

/* ══════════════════════════════════════════════
   PROGRESS BAR (thin, bottom)
══════════════════════════════════════════════ */
#progress {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.06);
  z-index: 90;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #e8b84b, #ffd166);
  transition: width 0.5s ease;
  width: 0%;
}
</style>
</head>

<!-- HEADER -->
<div id="header">
  <div class="logo">⚡ <span>YGO</span> Price Duel</div>
  <div class="score-badge">

      <span class="val" id="sScore">0</span>
      <span class="lbl">Score</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item">
      <span class="val" id="sStreak" style="color:#f59e0b">0🔥</span>
      <span class="lbl">Série</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item">
      <span class="val" id="sBest">0</span>
      <span class="lbl">Record</span>
    </div>
  </div>
</div>

<!-- GAME PANELS -->
<div id="game">

  <!-- TOP PANEL = Carte A, prix visible -->
  <div class="panel panel-top" id="panelTop">
    <div class="shimmer" id="shimTop">🃏</div>
    <div class="panel-bg" id="bgTop"></div>
    <div class="panel-bg-grad"></div>
    <div class="panel-content">
      <div class="panel-eyebrow">Carte A · Prix connu</div>
      <div class="panel-name" id="nameTop">—</div>
      <div class="panel-type" id="typeTop"></div>
      <div class="price-tag">
        <div class="pt-lbl">Cardmarket</div>
        <div class="pt-val" id="priceTop">—</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM PANEL = Carte B, prix masqué -->
  <div class="panel panel-bot" id="panelBot">
    <div class="shimmer" id="shimBot">🃏</div>
    <div class="panel-bg" id="bgBot"></div>
    <div class="panel-bg-grad"></div>

      <div class="panel-eyebrow">Carte B · Devinez le prix</div>

        <div class="pt-lbl">Cardmarket</div>
        <div class="pt-val hidden" id="priceBot">?</div>

    </div>
  </div>

</div>

<!-- DIVIDER -->
<div id="divider">
  <div class="div-question">Laquelle est + chère ?</div>
  <button class="btn-guess" id="btnA" onclick="guess('A')">▲ A plus chère</button>
  <button class="btn-guess" id="btnB" onclick="guess('B')">▼ B plus chère</button>
</div>

<!-- LIVES -->
<div id="lives"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NEXT -->
<div id="next-btn">
  <button onclick="nextRound()">Carte suivante →</button>
</div>

<!-- PROGRESS -->
<div id="progress"><div id="progress-fill"></div></div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-emoji">💀</div>
  <div class="go-title">Défaite</div>
  <div class="go-sub">Tu as épuisé tes vies</div>
  <div class="go-cards">
    <div class="go-card">
      <div class="go-card-v" id="goScore">0</div>
      <div class="go-card-l">Score final</div>
    </div>
    <div class="go-sep"></div>
    <div class="go-card">
      <div class="go-card-v" id="goBest">0</div>
      <div class="go-card-l">Record</div>
    </div>
  </div>
  <button class="go-replay" onclick="restart()">↩ Rejouer</button>
</div>

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function loadBg(bgEl, shimEl, card) {
  shimEl.classList.remove('off');
  bgEl.style.backgroundImage = '';

  const tryImg = (url, fallback) => {
    const img = new Image();
    img.onload = () => {
      bgEl.style.backgroundImage = `url('${url}')`;
      shimEl.classList.add('off');
    };
    img.onerror = fallback;
    img.src = url;
  };

  const small = `https://images.ygoprodeck.com/images/cards_small/${card.id}.jpg`;
  const large = `https://images.ygoprodeck.com/images/cards/${card.id}.jpg`;

  tryImg(small, () =>
    tryImg(large, () => {
      // Pas d'image: gradient de secours selon le type
      const colors = {
        'Spell Card':    ['#0a2e1a','#0d4a28'],
        'Trap Card':     ['#2e0a1a','#4a0d2a'],
        'XYZ Monster':   ['#0a0a0a','#1a1a2e'],
        'Synchro Monster':['#1e1e1e','#2e2e2e'],
        'Link Monster':  ['#0a1a2e','#0d2a4a'],
        'Fusion Monster':['#1a0a2e','#2a0d4a'],
      };
      const [c1,c2] = colors[card.type] || ['#1a1a0a','#2e2e10'];
      bgEl.style.backgroundImage = `linear-gradient(135deg, ${c1}, ${c2})`;
      shimEl.classList.add('off');
    })
  );
}

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
const MAX_LIVES = 5;
let deck = [], idx = 0;
let G = {
  score:0, streak:0,
  best: +localStorage.getItem('ygo_v5_best')||0,
  lives:MAX_LIVES,
  cardA:null, cardB:null,
  answered:false
};

/* ═══════════════════════════════════════════════════════════
   UI RENDER
═══════════════════════════════════════════════════════════ */
function renderHUD() {
  document.getElementById('sScore').textContent  = G.score;
  document.getElementById('sStreak').textContent = G.streak>0?`${G.streak}🔥`:'0';
  document.getElementById('sBest').textContent   = G.best;

  // Lives
  const livesEl = document.getElementById('lives');
  livesEl.innerHTML = '';
  for(let i=0;i<MAX_LIVES;i++){
    const d=document.createElement('div');
    d.className='life'+(i>=G.lives?' lost':'');
    livesEl.appendChild(d);
  }

  // Progress
  document.getElementById('progress-fill').style.width =
    Math.min((idx/deck.length)*100,100)+'%';
}

function setPanel(which, card, showPrice) {
  const suffix = which==='top' ? 'Top' : 'Bot';
  loadBg(
    document.getElementById('bg'+suffix),
    document.getElementById('shim'+suffix),
    card
  );
  document.getElementById('name'+suffix).textContent = card.name;
  document.getElementById('type'+suffix).textContent = card.type;

  const pEl = document.getElementById('price'+suffix);
  if(showPrice){
    pEl.className='pt-val';
    pEl.textContent=`€${card.price.toFixed(2)}`;
  } else {
    pEl.className='pt-val hidden';
    pEl.textContent='?';
  }
}

function resetButtons(){
  ['btnA','btnB'].forEach(id=>{
    document.getElementById(id).disabled=false;
    document.getElementById(id).className='btn-guess';
  });
}

let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='',3000);
}

/* ═══════════════════════════════════════════════════════════
   PICK CARDS — ensure different prices
═══════════════════════════════════════════════════════════ */
function pick() {
  if(idx+1>=deck.length){ deck=shuffle(CARDS); idx=0; }
  let a=deck[idx], b=deck[idx+1];
  let tries=0;
  while(a.price===b.price && tries<12){
    idx++;
    if(idx+1>=deck.length){deck=shuffle(CARDS);idx=0;}
    b=deck[idx+1]; tries++;
  }
  G.cardA=a; G.cardB=b;
  idx+=2;
}

/* ═══════════════════════════════════════════════════════════
   NEXT ROUND
═══════════════════════════════════════════════════════════ */
function nextRound() {
  G.answered=false;
  document.getElementById('next-btn').classList.remove('show');
  resetButtons();

  // Reset bot: slide it out
  const bot=document.getElementById('panelBot');
  bot.classList.remove('slide-in');

  // Reset shimmers
  document.getElementById('shimTop').classList.remove('off');
  document.getElementById('shimBot').classList.remove('off');

  pick();
  setPanel('top', G.cardA, true);
  setPanel('bot', G.cardB, false);

  // Slide in after 2 frames
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bot.classList.add('slide-in');
  }));

  renderHUD();
}

/* ═══════════════════════════════════════════════════════════
   GUESS
═══════════════════════════════════════════════════════════ */
function guess(choice) {
  if(G.answered) return;
  G.answered=true;
  document.getElementById('btnA').disabled=true;
  document.getElementById('btnB').disabled=true;

  const pA=G.cardA.price, pB=G.cardB.price;
  const correct = pA>=pB ? 'A' : 'B';
  const ok = choice===correct;

  // Reveal B price
  const pEl=document.getElementById('priceBot');
  pEl.className='pt-val'; pEl.textContent=`€${pB.toFixed(2)}`;

  // Color buttons
  document.getElementById(`btn${choice}`).className='btn-guess '+(ok?'correct':'wrong');
  if(!ok) document.getElementById(`btn${correct}`).className='btn-guess correct';

  if(ok){
    G.score++; G.streak++;
    if(G.score>G.best){G.best=G.score;localStorage.setItem('ygo_v5_best',G.best);}
    const diff=Math.abs(pA-pB).toFixed(2);
    const streak=G.streak>=3?` · 🔥 ×${G.streak}`:'';
    showToast(`✓ Exact !  Diff €${diff}${streak}`,'ok');
  } else {
    G.streak=0; G.lives--;
    const winner=correct==='A'?G.cardA:G.cardB;
    showToast(`✗ Raté !  ${winner.name} = €${Math.max(pA,pB).toFixed(2)}`,'ko');
  }

  renderHUD();

  if(G.lives<=0){ setTimeout(gameOver,1600); return; }
  setTimeout(()=>document.getElementById('next-btn').classList.add('show'),700);
}

/* ═══════════════════════════════════════════════════════════
   GAME OVER / RESTART
═══════════════════════════════════════════════════════════ */
function gameOver(){
  document.getElementById('goScore').textContent=G.score;
  document.getElementById('goBest').textContent=G.best;
  document.getElementById('gameover').classList.add('show');
}
function restart(){
  G.score=G.streak=0; G.lives=MAX_LIVES; G.answered=false; idx=0;
  document.getElementById('gameover').classList.remove('show');
  deck=shuffle(CARDS);
  renderHUD();
  nextRound();
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
deck=shuffle(CARDS);
renderHUD();
nextRound();
</script>
