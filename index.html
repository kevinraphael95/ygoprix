<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Price Duel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Nunito', sans-serif;
  background: #0d0d14;
  overflow: hidden;
  color: #fff;
  user-select: none;
}

/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.logo {
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: -0.01em;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.logo-icon { font-size: 1.3rem; }
.logo span { color: #ffd166; }

.score-row {
  display: flex;
  align-items: center;
  gap: 24px;
}
.score-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1;
}
.score-item .val {
  font-size: 1.1rem;
  font-weight: 900;
  color: #ffd166;
}
.score-item .lbl {
  font-size: 0.48rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.35);
  margin-top: 2px;
}

/* ══════════════════════════════════════════════
   GAME LAYOUT — left | center | right  (like moreorless)
══════════════════════════════════════════════ */
#game {
  position: fixed;
  inset: 56px 0 0 0;
  display: flex;
  flex-direction: row;
}

/* LEFT panel — card A (known price) */
.panel {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  overflow: hidden;
}

.panel-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.12;
  filter: blur(2px);
  transition: opacity 0.5s;
}

/* Vertical divider */
#divider {
  width: 2px;
  background: rgba(255,255,255,0.1);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

/* Card image circle */
.card-circle {
  width: clamp(130px, 18vw, 220px);
  height: clamp(130px, 18vw, 220px);
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  background: #1a1a2e;
  position: relative;
  flex-shrink: 0;
  transition: transform 0.3s;
}
.card-circle:hover { transform: scale(1.04); }
.card-circle img {
  width: 100%;
  height: 160%;
  object-fit: cover;
  object-position: top center;
  margin-top: -10%;
}
.card-circle .shimmer-circle {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #1a1a2e 0%, #2a2a4e 50%, #1a1a2e 100%);
  background-size: 200% 100%;
  animation: shim 1.3s ease infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}
.card-circle .shimmer-circle.off { display: none; }
@keyframes shim {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

/* Panel content below circle */
.panel-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
  padding: 0 20px;
  text-align: center;
  max-width: 320px;
}

.panel-eyebrow {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 6px;
}

.panel-name {
  font-size: clamp(1rem, 2.2vw, 1.5rem);
  font-weight: 900;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 4px;
}

.panel-type {
  font-size: 0.68rem;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
  margin-bottom: 14px;
  letter-spacing: 0.05em;
}

/* "is" text */
.panel-is {
  font-size: 0.75rem;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* Price display */
.price-display {
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 900;
  color: #fff;
  line-height: 1;
  letter-spacing: -0.02em;
}
.price-display.hidden {
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.3em;
  font-size: clamp(1.4rem, 3vw, 2rem);
}

.price-sub {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}

/* ══════════════════════════════════════════════
   RIGHT PANEL — buttons zone
══════════════════════════════════════════════ */
.panel-right-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
}

.btn-choice {
  padding: 12px 28px;
  border-radius: 6px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.78rem, 1.6vw, 0.92rem);
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-higher {
  background: #e8344a;
  color: #fff;
  box-shadow: 0 4px 20px rgba(232,52,74,0.4);
}
.btn-higher:hover:not(:disabled) {
  background: #f04060;
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(232,52,74,0.55);
}

.btn-lower {
  background: #4a3de8;
  color: #fff;
  box-shadow: 0 4px 20px rgba(74,61,232,0.4);
}
.btn-lower:hover:not(:disabled) {
  background: #6055f0;
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(74,61,232,0.55);
}

.btn-choice:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
}

.btn-choice.correct {
  background: #06d6a0 !important;
  box-shadow: 0 4px 20px rgba(6,214,160,0.5) !important;
}
.btn-choice.wrong {
  background: #555 !important;
  box-shadow: none !important;
}

/* VS center badge (on divider) */
#vs-badge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 48px;
  height: 48px;
  background: #0d0d14;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4);
  z-index: 20;
}

/* ══════════════════════════════════════════════
   LIVES (bottom center)
══════════════════════════════════════════════ */
#lives {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
}
.life {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px rgba(255,255,255,0.5);
  transition: all 0.3s;
}
.life.lost {
  background: rgba(255,255,255,0.15);
  box-shadow: none;
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
#toast {
  position: fixed;
  top: 68px; left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: rgba(10,10,20,0.95);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 22px;
  font-size: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok { color: #06d6a0; border-color: rgba(6,214,160,0.3); }
#toast.ko { color: #ef233c; border-color: rgba(239,35,60,0.25); }

/* ══════════════════════════════════════════════
   NEXT BUTTON
══════════════════════════════════════════════ */
#next-btn {
  position: fixed;
  bottom: 48px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
}
#next-btn.show {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
#next-btn button {
  padding: 13px 34px;
  background: linear-gradient(135deg, #e8b84b, #ffd166);
  color: #111;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(255,209,102,0.45);
  transition: transform 0.15s;
}
#next-btn button:hover { transform: scale(1.06); }

/* ══════════════════════════════════════════════
   GAME OVER
══════════════════════════════════════════════ */
#gameover {
  position: fixed; inset: 0;
  z-index: 500;
  background: rgba(8,8,16,0.97);
  backdrop-filter: blur(20px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  text-align: center;
  padding: 32px;
}
#gameover.show { display: flex; animation: goIn 0.4s ease; }
@keyframes goIn {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}
.go-emoji { font-size: 4rem; }
.go-title {
  font-size: clamp(3rem, 9vw, 6rem);
  font-weight: 900;
  color: #ef233c;
  letter-spacing: -0.02em;
  filter: drop-shadow(0 0 30px rgba(239,35,60,0.5));
  line-height: 1;
}
.go-sub {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.go-cards {
  display: flex;
  gap: 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 20px 36px;
}
.go-card { text-align: center; }
.go-card-v {
  font-size: 2.5rem;
  font-weight: 900;
  color: #ffd166;
  line-height: 1;
}
.go-card-l {
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}
.go-sep { width: 1px; background: rgba(255,255,255,0.08); }
.go-replay {
  padding: 14px 40px;
  background: linear-gradient(135deg, #e8b84b, #ffd166);
  color: #111;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(255,209,102,0.4);
  transition: transform 0.15s;
}
.go-replay:hover { transform: scale(1.05); }

/* ══════════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════════ */
#progress {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.06);
  z-index: 90;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #e8b84b, #ffd166);
  transition: width 0.5s ease;
  width: 0%;
}

/* Fade in panel */
.panel-fade {
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.97); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<!-- HEADER -->
<div id="header">

  </div>

      <span class="val" id="sHighscore">0</span>
      <span class="lbl">Highscore</span>
    </div>
    <div class="score-item">
      <span class="val" id="sScore" style="color:#ffd166">0</span>
      <span class="lbl">Score</span>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game">

  <!-- LEFT PANEL — Carte A (prix connu) -->
  <div class="panel" id="panelLeft">
    <div class="panel-bg" id="bgLeft"></div>
    <div class="card-circle" id="circleLeft">
      <div class="shimmer-circle" id="shimLeft">🃏</div>

      <div class="panel-is">est à</div>
      <div class="price-display" id="priceLeft">—</div>
      <div class="price-sub">Cardmarket</div>
    </div>
  </div>

  <!-- DIVIDER -->
  <div id="divider">
    <div id="vs-badge">VS</div>
  </div>

  <!-- RIGHT PANEL — Carte B (prix masqué, boutons) -->
  <div class="panel" id="panelRight">
    <div class="panel-bg" id="bgRight"></div>
    <div class="card-circle" id="circleRight">
      <div class="shimmer-circle" id="shimRight">🃏</div>

        </button>
        <button class="btn-choice btn-lower" id="btnLower" onclick="guess('lower')">
          ↓ Moins chère
        </button>
      </div>
    </div>
  </div>

</div>

<!-- LIVES -->
<div id="lives"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NEXT -->
<div id="next-btn">
  <button onclick="nextRound()">Carte suivante →</button>
</div>

<!-- PROGRESS -->
<div id="progress"><div id="progress-fill"></div></div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-emoji">💀</div>
  <div class="go-title">Défaite</div>
  <div class="go-sub">Tu as épuisé tes vies</div>
  <div class="go-cards">
    <div class="go-card">
      <div class="go-card-v" id="goScore">0</div>
      <div class="go-card-l">Score final</div>
    </div>
    <div class="go-sep"></div>
    <div class="go-card">
      <div class="go-card-v" id="goBest">0</div>
      <div class="go-card-l">Record</div>
    </div>
  </div>
  <button class="go-replay" onclick="restart()">↩ Rejouer</button>
</div>

/* ═══════════════════════ HELPERS ═══════════════════════ */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function loadCardImage(imgEl, shimEl, card) {
  shimEl.classList.remove('off');
  imgEl.style.display = 'none';

  const tryUrl = (url, fallback) => {
    const i = new Image();
    i.onload = () => {
      imgEl.src = url;
      imgEl.style.display = 'block';
      shimEl.classList.add('off');
    };
    i.onerror = fallback;
    i.src = url;
  };

  const small = `https://images.ygoprodeck.com/images/cards_small/${card.id}.jpg`;
  const large = `https://images.ygoprodeck.com/images/cards/${card.id}.jpg`;

  tryUrl(small, () =>
    tryUrl(large, () => {
      shimEl.textContent = '🃏';
      shimEl.classList.add('off');
      shimEl.style.animation = 'none';
      shimEl.style.background = '#1a1a2e';
      shimEl.style.display = 'flex';
    })
  );
}

/* ═══════════════════════ STATE ═══════════════════════ */
const MAX_LIVES = 5;
let deck = [], idx = 0;
let best = +localStorage.getItem('ygo_moreorless_best') || 0;
let G = { score:0, streak:0, lives:MAX_LIVES, cardA:null, cardB:null, answered:false };

/* ═══════════════════════ RENDER ═══════════════════════ */
function renderHUD() {
  document.getElementById('sScore').textContent = G.score;
  document.getElementById('sHighscore').textContent = best;

  const livesEl = document.getElementById('lives');
  livesEl.innerHTML = '';
  for(let i=0;i<MAX_LIVES;i++){
    const d=document.createElement('div');
    d.className='life'+(i>=G.lives?' lost':'');
    livesEl.appendChild(d);
  }

  document.getElementById('progress-fill').style.width = Math.min((idx/deck.length)*100,100)+'%';
}

function setPanel(side, card, showPrice) {
  const cap = side === 'left' ? 'Left' : 'Right';
  loadCardImage(
    document.getElementById('img'+cap),
    document.getElementById('shim'+cap),
    card
  );
  // bg blur
  document.getElementById('bg'+cap).style.backgroundImage =
    `url('https://images.ygoprodeck.com/images/cards_small/${card.id}.jpg')`;

  document.getElementById('name'+cap).textContent = card.name;
  document.getElementById('type'+cap).textContent = card.type;

  const pEl = document.getElementById('price'+cap);
  if(showPrice){
    pEl.className = 'price-display';
    pEl.textContent = `€${card.price.toFixed(2)}`;
  } else {
    pEl.className = 'price-display hidden';
    pEl.textContent = '?';
  }
}

function resetButtons(){
  document.getElementById('btnHigher').disabled = false;
  document.getElementById('btnLower').disabled = false;
  document.getElementById('btnHigher').className = 'btn-choice btn-higher';
  document.getElementById('btnLower').className = 'btn-choice btn-lower';
}

let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='',3200);
}

/* ═══════════════════════ PICK ═══════════════════════ */
function pick() {
  if(idx+1>=deck.length){ deck=shuffle(CARDS); idx=0; }
  let a=deck[idx], b=deck[idx+1];
  let tries=0;
  while(a.price===b.price && tries<12){
    idx++;
    if(idx+1>=deck.length){deck=shuffle(CARDS);idx=0;}
    b=deck[idx+1]; tries++;
  }
  G.cardA=a; G.cardB=b;
  idx+=2;
}

/* ═══════════════════════ ROUND ═══════════════════════ */
function nextRound() {
  G.answered = false;
  document.getElementById('next-btn').classList.remove('show');
  resetButtons();

  pick();

  // Animate panels
  document.getElementById('panelLeft').classList.remove('panel-fade');
  document.getElementById('panelRight').classList.remove('panel-fade');
  void document.getElementById('panelLeft').offsetWidth;
  document.getElementById('panelLeft').classList.add('panel-fade');
  document.getElementById('panelRight').classList.add('panel-fade');

  setPanel('left', G.cardA, true);
  setPanel('right', G.cardB, false);

  renderHUD();
}

/* ═══════════════════════ GUESS ═══════════════════════ */
function guess(choice) {
  if(G.answered) return;
  G.answered = true;

  document.getElementById('btnHigher').disabled = true;
  document.getElementById('btnLower').disabled = true;

  const pA = G.cardA.price, pB = G.cardB.price;
  // "higher" = B is more expensive than A
  const correctChoice = pB > pA ? 'higher' : 'lower';
  const ok = choice === correctChoice;

  // Reveal B price
  const pEl = document.getElementById('priceRight');
  pEl.className = 'price-display';
  pEl.textContent = `€${pB.toFixed(2)}`;

  // Button feedback
  const btnH = document.getElementById('btnHigher');
  const btnL = document.getElementById('btnLower');

  if(choice === 'higher'){
    btnH.className = 'btn-choice ' + (ok ? 'correct' : 'wrong');
    if(!ok) btnL.className = 'btn-choice correct';
  } else {
    btnL.className = 'btn-choice ' + (ok ? 'correct' : 'wrong');
    if(!ok) btnH.className = 'btn-choice correct';
  }

  if(ok){
    G.score++; G.streak++;
    if(G.score > best){ best = G.score; localStorage.setItem('ygo_moreorless_best', best); }
    const diff = Math.abs(pA-pB).toFixed(2);
    const s = G.streak >= 3 ? ` · 🔥 ×${G.streak}` : '';
    showToast(`✓ Correct !  Diff €${diff}${s}`, 'ok');
  } else {
    G.streak = 0; G.lives--;
    const expensive = pA > pB ? G.cardA : G.cardB;
    showToast(`✗ Raté !  ${expensive.name} = €${Math.max(pA,pB).toFixed(2)}`, 'ko');
  }

  renderHUD();

  if(G.lives <= 0){ setTimeout(gameOver, 1700); return; }
  setTimeout(() => document.getElementById('next-btn').classList.add('show'), 800);
}

/* ═══════════════════════ GAME OVER ═══════════════════════ */
function gameOver(){
  document.getElementById('goScore').textContent = G.score;
  document.getElementById('goBest').textContent = best;
  document.getElementById('gameover').classList.add('show');
}

function restart(){
  G.score = G.streak = 0; G.lives = MAX_LIVES; G.answered = false; idx = 0;
  document.getElementById('gameover').classList.remove('show');
  deck = shuffle(CARDS);
  renderHUD();
  nextRound();
}

/* ═══════════════════════ INIT ═══════════════════════ */
deck = shuffle(CARDS);
renderHUD();
nextRound();
</script>
